<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1A2F4B"/>
  <circle cx="32" cy="32" r="28" fill="none" stroke="#3B82C4" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Optimization path / route -->
  <path d="M16 44 Q22 28 30 32 Q38 36 34 22 Q30 14 40 16 Q48 18 48 24"
        fill="none" stroke="#3B82C4" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- Path nodes -->
  <circle cx="16" cy="44" r="2.5" fill="#5A9FD4"/>
  <circle cx="30" cy="32" r="2" fill="#5A9FD4"/>
  <circle cx="34" cy="22" r="2" fill="#5A9FD4"/>
  <circle cx="48" cy="24" r="2.5" fill="#FF8C00"/>

  <!-- Chibi ant body -->
  <ellipse cx="32" cy="40" rx="7" ry="5.5" fill="#3B82C4"/>
  <ellipse cx="32" cy="33" rx="5.5" ry="5" fill="#4A94D0"/>

  <!-- Ant head -->
  <circle cx="32" cy="26" r="6" fill="#5AABDE"/>

  <!-- Eyes -->
  <circle cx="29.5" cy="25" r="2" fill="white"/>
  <circle cx="34.5" cy="25" r="2" fill="white"/>
  <circle cx="30" cy="24.8" r="1" fill="#1A2F4B"/>
  <circle cx="35" cy="24.8" r="1" fill="#1A2F4B"/>

  <!-- Eye shine -->
  <circle cx="30.5" cy="24.2" r="0.4" fill="white"/>
  <circle cx="35.5" cy="24.2" r="0.4" fill="white"/>

  <!-- Smile -->
  <path d="M30 28 Q32 30 34 28" fill="none" stroke="#1A2F4B" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Antennae -->
  <path d="M29 21 Q26 14 22 12" fill="none" stroke="#5AABDE" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M35 21 Q38 14 42 12" fill="none" stroke="#5AABDE" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="22" cy="12" r="2" fill="#FF8C00"/>
  <circle cx="42" cy="12" r="2" fill="#FF8C00"/>

  <!-- Legs -->
  <line x1="26" y1="37" x2="20" y2="42" stroke="#3B82C4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26" y1="40" x2="19" y2="46" stroke="#3B82C4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="38" y1="37" x2="44" y2="42" stroke="#3B82C4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="38" y1="40" x2="45" y2="46" stroke="#3B82C4" stroke-width="1.5" stroke-linecap="round"/>
</svg>
